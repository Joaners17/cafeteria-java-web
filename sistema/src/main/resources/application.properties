# Nombre de tu proyecto
spring.application.name=sistema

# CONFIGURACI”N DE BASE DE DATOS (HÌbrida)
# Localmente usar· 'sistema' / En Railway usar· la variable de entorno
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/sistema}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Joaners1703}

# Driver y Dialecto
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CONFIGURACI”N JPA / HIBERNATE
# 'update' crea las tablas autom·ticamente si no existen
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola para que veas quÈ est· pasando
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PUERTO DEL SERVIDOR
# Localmente usa el 8080 / Railway asignar· uno autom·ticamente
server.port=${PORT:8080}